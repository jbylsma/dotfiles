# keyd configuration -- ThinkPad T490

# Match only the built-in keyboard.
[ids]
0001:0001

[main]

# Print Screen -> Right Super (Super_R) (was altwin:prtsc_rwin).
sysrq = rightmeta

# Swap Esc and Caps Lock.
capslock = esc
esc = capslock

# Both Shifts together toggle Caps Lock.
leftshift+rightshift = capslock
