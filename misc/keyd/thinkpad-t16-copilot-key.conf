# keyd configuration -- ThinkPad T16
#
# Remaps the Microsoft "Copilot" key to Right Super (Super_R) on the
# ThinkPad T16's built-in keyboard.
#
# The Copilot key emits a simultaneous chord at the evdev layer:
#   leftmeta + leftshift + f23
# (X relabels the f23 scancode as XF86TouchpadOff, keycode 201.)
#
# keyd intercepts below X and collapses the chord into a single clean
# keystroke -- something xkb/xmodmap cannot do, since the meta and shift
# presses are real key events sent by the keyboard firmware.
#
# keyd loads every *.conf in /etc/keyd/, so this lives under a descriptive
# name rather than default.conf.
#
# On Debian the binary is installed as `keyd.rvaiya` (no plain `keyd`
# alternative is registered), and the package auto-enables the service.
#
# Install:
#   sudo apt install keyd
#   sudo install -Dm644 thinkpad-t16-copilot-key.conf \
#     /etc/keyd/thinkpad-t16-copilot-key.conf
#   sudo keyd.rvaiya reload
#
# Verify with `sudo keyd.rvaiya monitor` or `xev`: the Copilot key should
# report a lone Super_R.

# Match only the T16's built-in keyboard (AT Translated Set 2 keyboard,
# vendor:product 0001:0001) so external USB keyboards are left untouched.
[ids]
0001:0001

[main]
leftmeta+leftshift+f23 = rightmeta
