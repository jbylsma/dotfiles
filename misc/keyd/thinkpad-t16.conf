# keyd configuration -- ThinkPad T16

# Match only the built-in keyboard.
[ids]
0001:0001

[main]

# Microsoft "Copilot" key sends a simultaneous leftmeta+leftshift+f23
# chord (X relabels the f23 scancode as XF86TouchpadOff, keycode 201);
# collapse it into a clean Right Super (Super_R).
leftmeta+leftshift+f23 = rightmeta

# Swap Esc and Caps Lock.
capslock = esc
esc = capslock

# Both Shifts together toggle Caps Lock.
leftshift+rightshift = capslock
