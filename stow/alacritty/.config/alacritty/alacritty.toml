# Colors and font are generated from the active Regolith look by
# regolith-look-to-alacritty and written to regolith-look.toml. Missing
# imports are silently skipped, so alacritty still launches before first run.

[general]
import = ["~/.config/alacritty/regolith-look.toml"]

[bell]
animation = "EaseOutExpo"
duration = 100
color = "#555555"

[cursor]
style = { shape = "Block", blinking = "On" }

[mouse]
hide_when_typing = true

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true, mods = "Control" }
binding = { key = "O", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`\\\\]+"
