# Colors and font are generated from the active Regolith look by
# regolith-look-to-alacritty and written to regolith-look.toml. Missing
# imports are silently skipped, so alacritty still launches before first run.

[general]
import = ["~/.config/alacritty/regolith-look.toml"]

[bell]
animation = "EaseOutExpo"
duration = 100
color = "#555555"

[cursor]
style = { shape = "Block", blinking = "On" }

[mouse]
hide_when_typing = true
